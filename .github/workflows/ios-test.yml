name: iOS Build Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-ios:
    # Use a macOS runner which has Xcode pre-installed
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Sync Capacitor iOS Project
        run: |
          npx cap sync ios

      - name: Compile Xcode Project (Unsigned for Device)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     clean build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Package as .ipa
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Debug-iphoneos/App.app Payload/
          zip -r MedVault.ipa Payload

      - name: Upload .ipa Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedVault-iOS-Unsigned-ipa
          path: MedVault.ipa
