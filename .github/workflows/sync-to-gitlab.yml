name: Sync to GitLab from Github

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.MEDVAULTCOMMONTOKEN_GITLAB }}@gitlab.com/abhinav2231989-admin-group/MedVaultAppv_Common.git
          git push gitlab main --force
